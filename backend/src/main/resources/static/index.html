<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>autotests.ai — landing</title>
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/link.css">
  <link rel="stylesheet" href="/css/input.css">
  <link rel="stylesheet" href="/css/icon.css">
  <link rel="stylesheet" href="/css/icon-btn.css">
  <link rel="stylesheet" href="/css/lang-toggle.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/logo/favicon-32.png?v=27a9328a6e37">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/logo/apple-touch-icon.png?v=27a9328a6e37">
  <meta property="og:image" content="/assets/logo/og-1200x630.png?v=27a9328a6e37">
  <meta property="og:title" content="autotests.ai">
  <meta name="twitter:card" content="summary_large_image">
</head>
<body>
  <div id="app-header"></div>
  <script>
    window.headerConfig = {
      brand: { href: 'https://qa.guru/', autotestsHref: '/' },
      nav: [],
      lang: { default: 'ru' },
      theme: { default: 'dark' },
    };
  </script>
  <script type="module" src="/js/header.js"></script>

  <main class="configurator landing" data-testid="landing-layout">
    <div class="configurator__layout landing__workspace">
      <div class="landing__aside">
        <div class="landing__output-panel">
          <div class="landing__output-sticky">
            <div class="panel panel--sticky">
              <div class="panel__main">
                <div class="terminal-panel" data-testid="terminal-panel">
                  <div class="terminal-panel__bar">
                    <div class="terminal-panel__dots" aria-hidden="true">
                      <span class="terminal-panel__dot"></span>
                      <span class="terminal-panel__dot"></span>
                      <span class="terminal-panel__dot"></span>
                    </div>
                    <div class="terminal-panel__trail">
                      <span class="terminal-panel__title">terminal — autotests.ai</span>
                    </div>
                  </div>
                  <pre
                    class="terminal-panel__code landing__terminal-output"
                    data-testid="terminal-output"
                    aria-label="Terminal output"
                  >→ Loading…</pre>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="/js/app.js"></script>
</body>
</html>
