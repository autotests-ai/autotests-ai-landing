spring:
  application:
    name: autotests-ai-landing
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:autotests_ai}
    username: ${DB_USER:autotests}
    password: ${DB_PASSWORD:autotests}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}
