# Nginx vhost for autotests.ai — install on selenoid.autotests.cloud host.
# Selenoid UI keeps :8080; landing backend listens on 127.0.0.1:8081 only.

upstream autotests_ai_backend {
    server 127.0.0.1:8081;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name autotests.ai www.autotests.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name autotests.ai www.autotests.ai;

    # certbot/Let's Encrypt paths on host — adjust if using another CA
    ssl_certificate     /etc/letsencrypt/live/autotests.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autotests.ai/privkey.pem;

    add_header X-Content-Type-Options nosniff always;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://autotests_ai_backend;
    }
}
