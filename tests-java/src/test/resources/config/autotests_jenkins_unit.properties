# autotests_jenkins — unit (pure Java — helpers/*Test, config/*Test)
# ./gradlew testUnit -DpyramidStand=autotests_jenkins

# Allure report
allureReportMode=none
allureAgentMode=none

# Allow attachments after each test
attachBrowserConsoleLogs=false
attachHarLogs=false
attachLastScreenshot=false
attachPageSource=false
attachVideo=false
# Allow allure steps listener
enableAllureSelenideListener=false

# Target app
baseUrl=https://autotests.ai/

# REST API
apiBaseUrl=https://autotests.ai/

# Selenoid hub
hubUrl=http://127.0.0.1:4444/
uiUrl=http://127.0.0.1:8080/

# Browser configuration
browser=chrome
browserVersion=148
browserSize=1920x1280
headless=true
closeBrowserAfterAll=true

# Remote browser hub configuration
enableHar=false
enableVnc=false
enableVideo=false
videoFolder=http://127.0.0.1:4444/video/
remoteUrl=http://127.0.0.1:4444/wd/hub

# Console log
logToConsole=false
selenideLogToConsole=false
rootLogLevel=info
