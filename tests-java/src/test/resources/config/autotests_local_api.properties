# autotests_local — api (@Layer(api) @Tag(api) — Rest Assured /api/terminal)
# ./gradlew testApi -DpyramidStand=autotests_local

# Allure report
allureReportMode=allure3
allureAgentMode=none

# Allow attachments after each test
attachBrowserConsoleLogs=false
attachHarLogs=false
attachLastScreenshot=false
attachPageSource=false
attachVideo=false
# Allow allure steps listener
enableAllureSelenideListener=false

# Target app
baseUrl=http://localhost:8081/

# REST API
apiBaseUrl=http://localhost:8081/

# Browser configuration
browser=chrome
browserVersion=148.0
browserSize=1920x1280
headless=true
closeBrowserAfterAll=true

# Remote browser hub configuration
enableHar=false
enableVnc=false
enableVideo=false
# videoFolder=
# remoteUrl=

# Console log
logToConsole=true
selenideLogToConsole=true
rootLogLevel=info
