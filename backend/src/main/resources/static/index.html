<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>autotests.ai — landing</title>
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/link.css">
  <link rel="stylesheet" href="/css/input.css">
  <link rel="stylesheet" href="/css/icon.css">
  <link rel="stylesheet" href="/css/icon-btn.css">
  <link rel="stylesheet" href="/css/lang-toggle.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="app-header"></div>
  <script>
    window.headerConfig = {
      brand: { href: 'https://qa.guru/' },
      nav: [
        { href: '/', label: 'Главная', active: true, testid: 'header-nav-home' },
        { href: 'https://qa.guru/', label: 'Курсы', testid: 'header-nav-courses' },
        { href: 'https://qa.guru/about', label: 'О школе', testid: 'header-nav-about' },
      ],
      lang: { default: 'ru' },
      theme: { default: 'dark' },
    };
  </script>
  <script type="module" src="/js/header.js"></script>

  <main class="configurator landing" data-testid="landing-layout">
    <div class="configurator__layout grid grid--2x1 landing__workspace">
      <div class="configurator__main landing__main">
        <div class="landing__brand" data-testid="landing-brand">autotests<span class="landing__brand-accent">.ai</span></div>
        <p class="text text--muted landing__lead">
          Spring Boot + PostgreSQL. Терминал справа обновляется через <code>GET /api/terminal</code>.
        </p>
        <button type="button" class="btn btn--primary landing__refresh" data-testid="refresh-button">Обновить</button>
        <div class="landing__status status" data-testid="status-line"></div>
      </div>

      <div class="configurator__aside landing__aside">
        <div class="landing__output-panel">
          <div class="landing__output-sticky">
            <div class="panel panel--sticky">
              <div class="panel__main">
                <div class="terminal-panel" data-testid="terminal-panel">
                  <div class="terminal-panel__bar">
                    <div class="terminal-panel__dots" aria-hidden="true">
                      <span class="terminal-panel__dot"></span>
                      <span class="terminal-panel__dot"></span>
                      <span class="terminal-panel__dot"></span>
                    </div>
                    <div class="terminal-panel__trail">
                      <span class="terminal-panel__title">terminal — autotests.ai</span>
                    </div>
                  </div>
                  <pre
                    class="terminal-panel__code landing__terminal-output"
                    data-testid="terminal-output"
                    aria-label="Terminal output"
                  >autotests.ai — terminal
Нажмите «Обновить» для GET /api/terminal</pre>
                </div>
              </div>
              <div class="panel__foot landing__output-foot">
                <p class="text text--sm text--muted">REST API · PostgreSQL</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="/js/app.js"></script>
</body>
</html>
