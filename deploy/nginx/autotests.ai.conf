upstream autotests_ai_backend {
    server 127.0.0.1:8081;
    keepalive 8;
}

server {
    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;

    server_name autotests.ai www.autotests.ai;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff always;

    access_log /var/log/nginx/autotests.ai.access.log;
    error_log  /var/log/nginx/autotests.ai.error.log;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://autotests_ai_backend;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name autotests.ai www.autotests.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
