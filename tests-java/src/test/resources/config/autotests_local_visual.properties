# autotests_local — visual (CI slice: @Layer(e2e) + @Tag(visual))
# ./gradlew testVisual -DpyramidStand=autotests_local

# Allow attachments after each test
attachBrowserConsoleLogs=false
attachHarLogs=false
attachLastScreenshot=false
attachPageSource=false
attachVideo=false
# Allow allure steps listener
enableAllureSelenideListener=false

# Target app
baseUrl=http://localhost:8081/

# REST API
apiBaseUrl=http://localhost:8081/

# Browser configuration
browser=chrome
browserVersion=148
browserSize=1920x1280
headless=true
closeBrowserAfterEach=false
closeBrowserAfterAll=true

# Remote browser hub configuration
enableHar=false
enableVnc=false
enableVideo=false
# videoFolder=
# remoteUrl=

# Visual baselines
updateBaselines=false
baselinesDir=screenshots
visualDiffThreshold=0.015

# Console log
logToConsole=true
selenideLogToConsole=true
rootLogLevel=info
